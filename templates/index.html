<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>叙华</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css', v='20260515-version') }}" />
  </head>
  <body>
    <div class="scroll-surface">
      <!-- 挂轴：数字人 -->
      <section class="hanging-scroll" aria-label="数字人叙华">
        <div class="scroll-rod"></div>
        <div class="scroll-body">
          <video
            id="digitalHumanVideo"
            class="scroll-video is-active"
            src="{{ url_for('static', filename='media/wait1.mp4') }}"
            autoplay muted playsinline preload="auto"
          ></video>
          <video
            id="digitalHumanVideoNext"
            class="scroll-video"
            muted playsinline preload="auto"
            aria-hidden="true"
          ></video>
          <div class="scroll-inscription">
            <span class="seal-mark">叙</span>
            <div class="inscription-text">
              <h1>叙华</h1>
              <p id="metaText">资料库已就绪</p>
            </div>
            <div class="figure-caption">
              <span id="digitalHumanStatus">待机</span>
              <span id="digitalHumanSpeech" class="caption-line">你好，我在这里。</span>
            </div>
          </div>
        </div>
        <div class="scroll-rod bottom-rod"></div>
      </section>

      <!-- 问页：问答 -->
      <section class="ask-leaf">
        <header class="leaf-head">
          <span class="leaf-kicker">问</span>
          <span class="leaf-title">向叙华提问</span>
          <span id="versionBadge" class="version-badge">v0.1.0</span>
          <span id="answerMode" class="leaf-badge" hidden></span>
        </header>
        <div class="leaf-body">
          <textarea id="questionInput" rows="2" placeholder="例如：推荐适合校园展示的河南非遗项目"></textarea>
          <div class="query-helper" aria-label="猜你想搜">
            <span class="query-helper-label">猜你想搜</span>
            <div id="querySuggestions" class="query-suggestions"></div>
          </div>
          <div class="ask-row">
            <button id="voiceToggle" class="voice-button" type="button" title="播放或停止语音播报" aria-pressed="false" data-state="idle">
              <span class="voice-icon" aria-hidden="true">
                <span class="voice-glyph"></span>
              </span>
              <span class="voice-label">播放</span>
            </button>
            <span id="voiceStatus" class="voice-hint"></span>
            <button id="askButton" type="button">提问</button>
          </div>
          <div class="answer-scroll is-idle" id="answerBox">
            <span class="idle-hint">等你开口。</span>
          </div>
        </div>
      </section>

      <!-- 批注：资料检索 / 详情 -->
      <aside class="marginalia">
        <div id="searchMode">
          <header class="marginalia-head">
            <span class="marginalia-kicker">注</span>
            <span id="relatedTitle" class="marginalia-title">资料检索</span>
            <span id="relatedCount" class="marginalia-count"></span>
          </header>
          <div class="marginalia-search">
            <input type="text" id="rightSearchInput" placeholder="搜索非遗项目…" />
            <button id="rightSearchButton" type="button">检索</button>
          </div>
          <div class="marginalia-categories" id="categoryChips">
            <button data-category="传统技艺">传统技艺</button>
            <button data-category="民俗">民俗</button>
            <button data-category="传统戏剧">传统戏剧</button>
            <button data-category="传统音乐">传统音乐</button>
            <button data-category="传统美术">传统美术</button>
            <button data-category="传统舞蹈">传统舞蹈</button>
            <button data-category="民间文学">民间文学</button>
            <button data-category="曲艺">曲艺</button>
            <button data-category="传统医药">传统医药</button>
            <button data-category="传统体育、游艺与杂技">体游杂技</button>
          </div>
          <div class="marginalia-list" id="relatedList">
            <p class="marginalia-empty">输入关键词检索非遗项目</p>
          </div>
        </div>
        <div id="detailMode" class="marginalia-detail" hidden>
          <button id="backToSearch" class="detail-back" type="button">← 返回</button>
          <span class="detail-cat" id="detailCategory"></span>
          <h2 id="detailTitle"></h2>
          <div class="detail-meta-row" id="detailMeta"></div>
          <p id="detailSupport" class="detail-support" hidden></p>
          <p id="detailBody" class="detail-body"></p>
        </div>
      </aside>
    </div>

    <script src="{{ url_for('static', filename='vendor/purify.min.js', v='3.4.2') }}"></script>
    <script src="{{ url_for('static', filename='vendor/marked.umd.js', v='18.0.3') }}"></script>
    <script type="module" src="{{ url_for('static', filename='js/main.js', v='20260515-progress') }}"></script>
  </body>
</html>
