<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>叙华</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css', v='20260502-ink7') }}" />
  </head>
  <body>
    <div class="scroll-surface">
      <!-- 挂轴：数字人 -->
      <section class="hanging-scroll" aria-label="数字人叙华">
        <div class="scroll-rod"></div>
        <div class="scroll-body">
          <video
            id="digitalHumanVideo"
            class="scroll-video"
            src="{{ url_for('static', filename='media/xuhua-idle.mp4') }}"
            autoplay muted loop playsinline
          ></video>
          <div class="scroll-inscription">
            <span class="seal-mark">叙</span>
            <div class="inscription-text">
              <h1>叙华</h1>
              <p id="metaText">资料库已就绪</p>
            </div>
            <div class="figure-caption">
              <span id="digitalHumanStatus">待机</span>
              <span id="digitalHumanSpeech" class="caption-line">你好，我在这里。</span>
            </div>
          </div>
        </div>
        <div class="scroll-rod bottom-rod"></div>
      </section>

      <!-- 问页：问答 -->
      <section class="ask-leaf">
        <header class="leaf-head">
          <span class="leaf-kicker">问</span>
          <span class="leaf-title">向叙华提问</span>
          <span id="answerMode" class="leaf-badge"></span>
        </header>
        <div class="leaf-body">
          <textarea id="questionInput" rows="2" placeholder="例如：罗山皮影戏有什么特色？"></textarea>
          <div class="ask-row">
            <label class="voice-toggle">
              <input id="voiceEnabled" type="checkbox" checked />
              <span>语音</span>
            </label>
            <span id="voiceStatus" class="voice-hint"></span>
            <button id="askButton" type="button">提问</button>
          </div>
          <div class="answer-scroll is-idle" id="answerBox">
            <span class="idle-hint">等你开口。</span>
          </div>
        </div>
      </section>

      <!-- 批注：参考资料 -->
      <aside class="marginalia">
        <header class="marginalia-head">
          <span class="marginalia-kicker">注</span>
          <span class="marginalia-title">相关资料</span>
          <span id="relatedCount" class="marginalia-count"></span>
        </header>
        <div class="marginalia-list" id="relatedList">
          <p class="marginalia-empty">暂无相关条目</p>
        </div>
        <div class="marginalia-detail" id="detailContent" hidden>
          <span class="detail-tag" id="detailCategory"></span>
          <h2 id="detailTitle"></h2>
          <blockquote id="detailSummary" class="detail-blurb"></blockquote>
          <p class="detail-label">原文</p>
          <p id="detailBody" class="detail-body"></p>
        </div>
        <p class="marginalia-empty" id="detailEmpty">选择条目查看详情</p>
      </aside>
    </div>

    <script src="{{ url_for('static', filename='app.js', v='20260502-ink7') }}"></script>
  </body>
</html>
